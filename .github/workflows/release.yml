name: release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release, e.g. v0.1.1'
        required: true

permissions:
  contents: write

env:
  GO_VERSION: '1.24.x'

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref }}

      - name: Assert VERSION matches tag
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            ref="${{ inputs.tag }}"
          else
            ref="${GITHUB_REF##*/}"
          fi
          tag="${ref#v}"
          file="$(cat VERSION)"
          if [[ "$tag" != "$file" ]]; then
            echo "VERSION ($file) does not match tag ($tag)" >&2
            exit 1
          fi

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cli/go.sum

      - name: Install test deps
        run: sudo apt-get update && sudo apt-get install -y jq shellcheck

      - name: Install yq
        run: |
          sudo curl -sSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

      - name: Plugin tests
        run: bash tests/test_guard.sh && bash tests/bench_guard.sh

      - name: CLI tests
        run: make test

      - name: shellcheck
        run: shellcheck hooks/guard hooks/session-start hooks/lib/*.sh tests/*.sh tests/lib/*.sh

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: cli
          version: v1.64.8

      - name: Build release artifacts
        run: make release

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ifly-release-${{ github.ref_name }}
          path: dist/*
          if-no-files-found: error

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          files: |
            dist/ifly-linux-amd64
            dist/ifly-linux-amd64.sha256
            dist/ifly-linux-arm64
            dist/ifly-linux-arm64.sha256
            dist/ifly-darwin-amd64
            dist/ifly-darwin-amd64.sha256
            dist/ifly-darwin-arm64
            dist/ifly-darwin-arm64.sha256
            dist/ifly-windows-amd64.exe
            dist/ifly-windows-amd64.exe.sha256
            dist/ifly-plugin-v*.tar.gz
          generate_release_notes: true
