name: ci

on:
  pull_request:
  push:
    branches: ['**']
    tags: ['v*.*.*']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: '1.24.x'

jobs:
  plugin-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Install jq and yq
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install bash jq yq
            echo "IFLY_BASH=$(brew --prefix bash)/bin/bash" >> "$GITHUB_ENV"
          else
            sudo apt-get update && sudo apt-get install -y jq
            sudo snap install yq || { sudo curl -sSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq && sudo chmod +x /usr/local/bin/yq; }
            echo "IFLY_BASH=bash" >> "$GITHUB_ENV"
          fi
      - name: Show bash version
        run: '"$IFLY_BASH" --version'
      - name: Run harness sanity
        run: '"$IFLY_BASH" tests/test_harness_sanity.sh'
      - name: Run library tests
        run: |
          "$IFLY_BASH" tests/test_parse_defaults.sh
          "$IFLY_BASH" tests/test_path_resolve.sh
          "$IFLY_BASH" tests/test_split_command.sh
          "$IFLY_BASH" tests/test_config.sh
          "$IFLY_BASH" tests/test_session_start.sh
      - name: Run guard tests
        run: '"$IFLY_BASH" tests/test_guard.sh'
      - name: Latency benchmark
        run: IFLY_BENCH_BUDGET_MS=150 "$IFLY_BASH" tests/bench_guard.sh
      - name: Install shellcheck
        run: |
          if [[ "${{ matrix.os }}" == "macos-latest" ]]; then
            brew install shellcheck
          else
            sudo apt-get install -y shellcheck
          fi
      - name: shellcheck
        run: shellcheck -e SC1091,SC2016,SC2088 hooks/guard hooks/session-start hooks/lib/*.sh tests/*.sh tests/lib/*.sh

  cli-tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cli/go.sum
      - name: Stage embed tree
        shell: bash
        run: |
          mkdir -p cli/plugin
          cp -r .claude-plugin hooks skills commands cli/plugin/
          cp defaults.yaml .ifly.yaml.example VERSION LICENSE cli/plugin/
      - name: Go test
        run: cd cli && go test ./...
      - name: golangci-lint
        if: matrix.os == 'ubuntu-latest'
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: cli
          version: v1.64.8

  defaults-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cli/go.sum
      - name: Install yq
        run: sudo snap install yq || { sudo curl -sSL https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -o /usr/local/bin/yq && sudo chmod +x /usr/local/bin/yq; }
      - name: Stage embed tree
        run: |
          mkdir -p cli/plugin
          cp defaults.yaml cli/plugin/defaults.yaml
      - name: Run drift check
        run: cd cli && go test ./internal/config/... -run TestDefaultsDrift

  build-artifacts:
    runs-on: ubuntu-latest
    needs: [plugin-tests, cli-tests, defaults-drift]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: cli/go.sum
      - name: Build all release targets
        run: make release
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ifly-${{ github.run_id }}-${{ github.sha }}
          path: dist/*
          if-no-files-found: error
